<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>INQUISITION - La chasse aux sorcières</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="conteneur">

    <div class="carte">

        <h1>⚜️ INQUISITION ⚜️</h1>

        <h2>La chasse aux sorcières</h2>

        <p class="intro">
            Le Grand Tribunal vous confie une mission.
        </p>

        <p>
            40 sorcières sont cachées dans la médiathèque.
        </p>

        <p>
            Mais attention...
        </p>

        <p>
            15 habitantes sont innocentes.
        </p>

        <p>
            Une erreur vous fera perdre un point.
        </p>

        <hr>

        <h3>Nom de votre équipe</h3>

        <input
            id="nomEquipe"
            type="text"
            maxlength="30"
            placeholder="Exemple : Les Corbeaux"
            autocomplete="off"
        >

        <p id="erreur" class="erreur"></p>

        <button id="btnCommencer">
            Commencer la mission
        </button>

        <p class="version">
            Version 1.0 - INQUISITION
        </p>

    </div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
