<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>INQUISITIO</title>

<style>

body {
    background-color: #1b1425;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 40px;
}

.carte {
    background-color: #241833;
    border: 3px solid #d4af37;
    border-radius: 20px;
    padding: 30px;
    max-width: 600px;
    margin: auto;
}

h1 {
    color: #d4af37;
    font-size: 45px;
}

h2 {
    color: #f4ecd8;
}

input {
    width: 80%;
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
    margin: 20px;
}

button {
    background-color: #d4af37;
    border: none;
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background-color: #f0d060;
}

</style>

</head>


<body>


<div class="carte">

<h1>⚜️ INQUISITIO</h1>

<h2>La chasse aux sorcières</h2>

<p>
Le Grand Tribunal vous confie une mission.
</p>

<p>
40 sorcières se cachent dans la médiathèque.
<br>
Mais attention...
<br>
15 habitantes sont innocentes.
</p>

<p>
Une accusation injustifiée vous fera perdre un point.
</p>


<h3>Nom de l'inquisiteur</h3>

<input type="text" placeholder="Votre prénom">


<br>

<button>
Commencer la mission
</button>


</div>

<script src="js/app.js"></script>

</body>

</html>
